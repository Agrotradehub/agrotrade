<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AgroTradeHub - Farm Direct Marketplace Ghana">
    <title>AgroTradeHub • Ghana</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <script src="sw.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .modal { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- Top Bar -->
    <div class="fixed top-0 left-0 right-0 bg-white shadow-md z-50 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-green-700 rounded-full flex items-center justify-center text-white font-bold">A</div>
            <h1 class="text-xl font-semibold text-green-700">AgroTradeHub</h1>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="showSection('products')" class="text-green-700">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 01-14 0 7 7 0 0114 0z" /></svg>
            </button>
            <div onclick="toggleProfile()" class="w-8 h-8 bg-green-100 rounded-full flex items-center justify-center text-green-700 font-bold cursor-pointer">A</div>
        </div>
    </div>

    <div class="pt-16 pb-20">

        <!-- NAV TABS -->
        <div class="flex bg-white border-b sticky top-14 z-40">
            <button onclick="showSection('home')" id="tab-home" class="flex-1 py-3 font-medium text-green-700 border-b-2 border-green-700">Home</button>
            <button onclick="showSection('products')" id="tab-products" class="flex-1 py-3 font-medium text-gray-500">Products</button>
            <button onclick="showSection('orders')" id="tab-orders" class="flex-1 py-3 font-medium text-gray-500">Orders</button>
            <button onclick="showSection('seller')" id="tab-seller" class="flex-1 py-3 font-medium text-gray-500">Seller</button>
        </div>

        <!-- HOME SECTION -->
        <div id="section-home" class="p-4">
            <div class="bg-green-700 text-white rounded-2xl p-6 mb-6">
                <h2 class="text-2xl font-semibold">Welcome back, Albert!</h2>
                <p class="mt-2 opacity-90">Fresh produce from Ghanaian farms delivered fast.</p>
            </div>
            <h3 class="font-semibold mb-3">Featured Today</h3>
            <div class="grid grid-cols-2 gap-4" onclick="openProductModal(0)">
                <div class="bg-white rounded-2xl overflow-hidden shadow">
                    <div class="h-40 bg-[url('https://picsum.photos/id/1015/600/400')] bg-cover"></div>
                    <div class="p-3">
                        <p class="font-medium">Fresh Mushrooms</p>
                        <p class="text-green-700 font-bold">GHS 50 /kg</p>
                        <p class="text-xs text-gray-500">69 Vegetable Farm • Kumasi</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- PRODUCTS SECTION -->
        <div id="section-products" class="p-4 hidden">
            <div class="flex gap-2 mb-4 overflow-x-auto">
                <button onclick="filterCategory(this)" class="category-btn active px-5 py-2 bg-green-700 text-white rounded-full text-sm whitespace-nowrap">All</button>
                <button onclick="filterCategory(this)" class="category-btn px-5 py-2 bg-gray-200 rounded-full text-sm whitespace-nowrap">Vegetables</button>
                <button onclick="filterCategory(this)" class="category-btn px-5 py-2 bg-gray-200 rounded-full text-sm whitespace-nowrap">Fruits</button>
            </div>

            <div id="product-grid" class="grid grid-cols-2 gap-4">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- ORDERS SECTION -->
        <div id="section-orders" class="p-4 hidden">
            <h3 class="font-semibold mb-4">My Orders</h3>
            <div class="space-y-4">
                <div class="bg-white p-4 rounded-2xl shadow flex justify-between">
                    <div>
                        <p class="font-medium">Mushrooms 2kg</p>
                        <p class="text-xs text-gray-500">Order #AT-7842 • Through AgroTradeHub</p>
                    </div>
                    <div class="text-right">
                        <span class="px-3 py-1 bg-green-100 text-green-700 text-xs rounded-full">Completed</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- SELLER DASHBOARD -->
        <div id="section-seller" class="p-4 hidden">
            <h3 class="font-semibold mb-4">Seller Dashboard</h3>
            <button onclick="alert('Add Product form would open here')" class="w-full bg-green-700 text-white py-4 rounded-2xl font-medium">+ Add New Product</button>
        </div>
    </div>

    <!-- PRODUCT DETAIL MODAL (with new Buy Options) -->
    <div id="product-modal" class="fixed inset-0 bg-black/60 hidden flex items-end z-50">
        <div class="modal bg-white w-full max-h-[92%] rounded-t-3xl overflow-y-auto">
            <div class="p-5">
                <!-- Close -->
                <button onclick="closeModal()" class="absolute top-6 right-6 text-3xl text-gray-400">×</button>

                <div id="modal-content">
                    <!-- Filled by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Footer nav -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t py-2 px-4 flex justify-around text-xs text-gray-500 z-50">
        <button onclick="showSection('home')" class="flex flex-col items-center">🏠 Home</button>
        <button onclick="showSection('products')" class="flex flex-col items-center">🛒 Products</button>
        <button onclick="showSection('orders')" class="flex flex-col items-center">📦 Orders</button>
        <button onclick="showSection('seller')" class="flex flex-col items-center">👨‍🌾 Seller</button>
    </div>

<script>
// Tailwind script
tailwind.config = { content: [], theme: { extend: {} } }

// Fake products (you can add more)
let products = [
    {
        id: 0,
        name: "Fresh Mushroom",
        category: "Vegetables",
        price: "50",
        unit: "kg",
        seller: "69 Vegetable Farm",
        location: "Kumasi, Ashanti",
        image: "https://picsum.photos/id/1015/600/400",
        phone: "05554737934",
        description: "Fresh mushrooms harvested today. 100kg available."
    },
    {
        id: 1,
        name: "Tomatoes",
        category: "Vegetables",
        price: "35",
        unit: "kg",
        seller: "Sunrise Farm",
        location: "Kumasi",
        image: "https://picsum.photos/id/201/600/400",
        phone: "0241234567",
        description: "Ripe red tomatoes from local farm."
    }
]

// Render product grid
function renderProducts(filteredProducts) {
    const grid = document.getElementById('product-grid')
    grid.innerHTML = ''
    filteredProducts.forEach(product => {
        const card = document.createElement('div')
        card.className = "bg-white rounded-2xl overflow-hidden shadow cursor-pointer"
        card.innerHTML = `
            <div class="h-40 bg-cover" style="background-image: url('${product.image}')"></div>
            <div class="p-3">
                <p class="font-medium">${product.name}</p>
                <p class="text-green-700 font-bold">GHS \( {product.price} / \){product.unit}</p>
                <p class="text-xs text-gray-500">${product.seller}</p>
            </div>
        `
        card.onclick = () => openProductModal(product.id)
        grid.appendChild(card)
    })
}

// Open modal with NEW BUY OPTIONS
function openProductModal(id) {
    const product = products.find(p => p.id === id)
    if (!product) return

    const modal = document.getElementById('product-modal')
    const content = document.getElementById('modal-content')

    content.innerHTML = `
        <div>
            <div class="h-56 bg-cover rounded-2xl mb-6" style="background-image: url('${product.image}')"></div>
            
            <h2 class="text-2xl font-semibold">${product.name}</h2>
            <p class="text-green-700 text-3xl font-bold mt-1">GHS \( {product.price} <span class="text-base font-normal">/ \){product.unit}</span></p>
            <p class="text-sm text-gray-500 mt-1">${product.seller} • ${product.location}</p>
            <div class="inline-block px-3 py-1 bg-green-100 text-green-700 text-xs rounded-full mt-2">VEGETABLES</div>

            <!-- NEW BUY OPTIONS SECTION -->
            <div class="mt-8 bg-gray-50 rounded-2xl p-5">
                <p class="font-semibold mb-3">How do you want to buy?</p>
                
                <div class="space-y-4">
                    <!-- Option 1: Direct from Farmer -->
                    <label onclick="selectBuyOption(1)" class="buy-option flex items-start gap-3 cursor-pointer">
                        <input type="radio" name="buyOption" value="direct" class="mt-1 accent-green-700">
                        <div>
                            <p class="font-medium">Directly from Farmer/Seller</p>
                            <p class="text-xs text-gray-600">Cheaper • Contact seller directly • You arrange delivery</p>
                        </div>
                    </label>

                    <!-- Option 2: Through AgroTradeHub (me) -->
                    <label onclick="selectBuyOption(2)" class="buy-option flex items-start gap-3 cursor-pointer">
                        <input type="radio" name="buyOption" value="platform" checked class="mt-1 accent-green-700">
                        <div>
                            <p class="font-medium">Through AgroTradeHub (my platform)</p>
                            <p class="text-xs text-green-700">Recommended • We handle delivery &amp; quality check • Fast &amp; safe</p>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Dynamic info area -->
            <div id="dynamic-info" class="mt-6 bg-green-50 rounded-2xl p-5">
                <div class="flex items-center gap-2 mb-3">
                    <span class="text-green-700">📍</span>
                    <p class="font-medium">69 Vegetable Farm</p>
                </div>
                <p id="delivery-note" class="text-sm text-gray-700">We handle all deliveries. Order now and we contact you to arrange.</p>
                <div class="flex items-center gap-3 mt-5">
                    <a href="tel:${product.phone}" class="flex-1 bg-white border border-green-700 text-green-700 py-3 rounded-2xl text-center font-medium">Call Seller</a>
                    <button onclick="chatWithSeller()" class="flex-1 bg-green-700 text-white py-3 rounded-2xl font-medium">Chat on WhatsApp</button>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="mt-8 flex gap-3">
                <button onclick="placeOrder()" class="flex-1 bg-green-700 text-white py-4 rounded-2xl font-semibold text-lg">Order Now</button>
                <button onclick="closeModal()" class="flex-1 border border-gray-300 py-4 rounded-2xl font-medium">Cancel</button>
            </div>
        </div>
    `

    modal.classList.remove('hidden')
    modal.classList.add('flex')

    // Default to platform option
    selectBuyOption(2)
}

// Buy option handler
function selectBuyOption(option) {
    const note = document.getElementById('delivery-note')
    const buttons = document.querySelectorAll('.buy-option input')

    if (option === 1) { // Direct
        note.innerHTML = `Contact seller directly to arrange pickup or delivery.<br><strong>Phone: 05554737934</strong>`
        note.className = "text-sm text-orange-700"
    } else { // Through platform
        note.innerHTML = `We handle all deliveries. Order now and we contact you to arrange.`
        note.className = "text-sm text-gray-700"
    }
}

function chatWithSeller() {
    alert("Opening WhatsApp chat with seller (05554737934) in real app")
}

function placeOrder() {
    const selected = document.querySelector('input[name="buyOption"]:checked').value
    if (selected === "direct") {
        alert("✅ Order sent directly to farmer! They will contact you shortly.")
    } else {
        alert("✅ Order placed through AgroTradeHub!\nWe will contact you to arrange delivery.")
    }
    closeModal()
}

function closeModal() {
    const modal = document.getElementById('product-modal')
    modal.classList.add('hidden')
    modal.classList.remove('flex')
}

// Section switching
function showSection(section) {
    document.querySelectorAll('[id^="section-"]').forEach(s => s.classList.add('hidden'))
    document.getElementById('section-' + section).classList.remove('hidden')

    // Update tab styles
    document.querySelectorAll('[id^="tab-"]').forEach(t => t.classList.remove('border-b-2', 'border-green-700', 'text-green-700'))
    document.getElementById('tab-' + section).classList.add('border-b-2', 'border-green-700', 'text-green-700')
}

// Category filter (demo)
function filterCategory(btn) {
    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active', 'bg-green-700', 'text-white'))
    btn.classList.add('active', 'bg-green-700', 'text-white')
    // In real app you would filter products here
}

// Simple profile
function toggleProfile() {
    alert("Profile / Account menu would open here")
}

// Init
window.onload = () => {
    renderProducts(products)
    showSection('home')
    
    // Make first category active
    document.querySelector('.category-btn').classList.add('active', 'bg-green-700', 'text-white')
}
</script>

</body>
</html>
